name: Deploy Project

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        run: |
          set -e

          # Detect package manager
          if [ -f "bun.lockb" ] || [ -f "bun.lock" ]; then
            PKG_MGR="bun"
          elif [ -f "pnpm-lock.yaml" ]; then
            PKG_MGR="pnpm"
            npm install -g pnpm
          elif [ -f "yarn.lock" ]; then
            PKG_MGR="yarn"
          else
            PKG_MGR="npm"
          fi
          echo "Using package manager: $PKG_MGR"

          # Install turbo globally if this is a turborepo (before install so it's available)
          if [ -f "turbo.json" ] || grep -q '"turbo"' package.json 2>/dev/null; then
            echo "Turborepo detected, installing turbo globally..."
            npm install -g turbo
          fi

          # Install ALL deps (no NODE_ENV=production so devDependencies are included)
          if [ "$PKG_MGR" = "bun" ]; then bun install
          elif [ "$PKG_MGR" = "pnpm" ]; then pnpm install --frozen-lockfile
          elif [ "$PKG_MGR" = "yarn" ]; then yarn install --frozen-lockfile
          else npm install
          fi

          # Patch CRA projects to use relative paths
          if grep -q '"react-scripts"' package.json 2>/dev/null; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json'));
              pkg.homepage = '.';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
              console.log('Set homepage for CRA');
            "
          fi

          # Patch Next.js configs to static export if not already set
          for cfg in next.config.js next.config.ts next.config.mjs apps/web/next.config.js apps/web/next.config.ts apps/web/next.config.mjs; do
            if [ -f "$cfg" ]; then
              if ! grep -q "output" "$cfg"; then
                node -e "
                  const fs = require('fs');
                  let c = fs.readFileSync('$cfg', 'utf8');
                  c = c.replace(/const nextConfig[^=]*=s*{/, 'const nextConfig = { output: "export", trailingSlash: true,');
                  fs.writeFileSync('$cfg', c);
                  console.log('Patched ' + '$cfg' + ' for static export');
                " 2>/dev/null || true
              fi
            fi
          done

          # Build
          if [ "$PKG_MGR" = "bun" ]; then bun run build
          elif [ "$PKG_MGR" = "pnpm" ]; then pnpm run build
          elif [ "$PKG_MGR" = "yarn" ]; then yarn build
          else npm run build
          fi
        env:
          CI: false

      - name: Find build output and fix paths
        run: |
          BUILD_DIR=""
          for dir in "apps/web/out" "apps/web/dist" "apps/web/build" "out" "dist" "build"; do
            if [ -d "$dir" ]; then BUILD_DIR="$dir"; break; fi
          done

          if [ -z "$BUILD_DIR" ]; then
            echo "ERROR: No build output directory found. Contents:"
            ls -la
            exit 1
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          echo "Found build dir: $BUILD_DIR"

          if [ -f "$BUILD_DIR/index.html" ]; then
            sed -i 's|href="/|href="./|g' "$BUILD_DIR/index.html"
            sed -i 's|src="/|src="./|g' "$BUILD_DIR/index.html"
            echo "Fixed asset paths in index.html"
          fi

      - name: Upload build
        run: |
          DEPLOYMENT_ID="653bc5e4-f777-4e10-825e-99a7e27ba210"
          BUILD_DIR="$BUILD_DIR"

          echo "Uploading from: $BUILD_DIR"
          SUCCESS=0
          FAIL=0

          find "$BUILD_DIR" -type f | while read file; do
            REL_PATH="${file#$BUILD_DIR/}"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://scalone.vedantchavare04.workers.dev/upload \
              -F "file=@$file" \
              -F "path=$REL_PATH" \
              -F "deploymentId=$DEPLOYMENT_ID")
            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=$((SUCCESS+1))
            else
              FAIL=$((FAIL+1))
              echo "Failed: $REL_PATH (HTTP $HTTP_CODE)"
            fi
          done

          echo "Done: $SUCCESS uploaded, $FAIL failed"
          echo "URL: https://scalone.vedantchavare04.workers.dev/deployments/$DEPLOYMENT_ID/"
